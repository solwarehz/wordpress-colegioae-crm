<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 170" aria-hidden="true">
  <!-- Book shadow -->
  <rect x="14" y="18" width="112" height="144" rx="6" fill="#000" opacity="0.12"/>
  <!-- Book body (red) -->
  <rect x="10" y="12" width="112" height="144" rx="6" fill="#e30914"/>
  <!-- Book body highlight -->
  <rect x="10" y="12" width="112" height="144" rx="6" fill="url(#grad)" opacity="0.25"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Book spine -->
  <rect x="10" y="12" width="8" height="144" rx="2" fill="#9b0610"/>
  <!-- Title band -->
  <rect x="22" y="30" width="94" height="3" fill="#ffffff" opacity="0.9"/>
  <text x="68" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">LIBRO DE</text>
  <text x="68" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">RECLAMACIONES</text>
  <!-- Scale/balance symbol -->
  <g transform="translate(68, 108)" stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round">
    <line x1="0" y1="-18" x2="0" y2="14"/>
    <line x1="-18" y1="-16" x2="18" y2="-16"/>
    <line x1="-18" y1="-16" x2="-22" y2="-4"/>
    <line x1="-18" y1="-16" x2="-14" y2="-4"/>
    <path d="M -22 -4 Q -18 2 -14 -4" stroke-width="2"/>
    <line x1="18" y1="-16" x2="14" y2="-4"/>
    <line x1="18" y1="-16" x2="22" y2="-4"/>
    <path d="M 14 -4 Q 18 2 22 -4" stroke-width="2"/>
    <line x1="-6" y1="14" x2="6" y2="14"/>
  </g>
  <!-- Footer band -->
  <rect x="22" y="138" width="94" height="3" fill="#ffffff" opacity="0.9"/>
</svg>
